<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Procesando invitación...</title>
<style>
  body { font-family: 'Work Sans', 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f8faf8; }
  .card { text-align: center; padding: 40px; }
  .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #2d3e2c; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: #555; font-size: 15px; }
</style></head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <p>Procesando invitación...</p>
  </div>
  <script>
    (async () => {
      const SUPABASE_URL = 'https://udhuizkqnmkhljmezzkd.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkaHVpemtxbm1raGxqbWV6emtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTM2MTYsImV4cCI6MjA5MTIyOTYxNn0.W9bJ1S8A45RUGaulhdVG6UohGmGNxGMjLBsc0Q7voPE';

      function getParams() {
        const hash = window.location.hash.replace(/^#/, '');
        const params = new URLSearchParams(hash);
        return {
          access_token: params.get('access_token'),
          refresh_token: params.get('refresh_token'),
          expires_in: params.get('expires_in'),
        };
      }

      const { access_token, refresh_token } = getParams();
      if (!access_token) {
        window.location.href = '/#login';
        return;
      }

      localStorage.setItem('supabase_session', JSON.stringify({
        access_token,
        refresh_token,
        expires_in: 3600,
      }));

      async function fetchUser() {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${access_token}`,
          },
        });
        if (!res.ok) throw new Error('Failed to get user');
        return res.json();
      }

      async function restFetch(path) {
        const res = await fetch(`${SUPABASE_URL}${path}`, {
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${access_token}`,
            'Content-Type': 'application/json',
            Prefer: 'return=representation',
          },
        });
        if (!res.ok) { if (res.status === 406) return []; const b = await res.json().catch(() => ({})); throw new Error(b.message || b.error || 'Error'); }
        return res.headers.get('content-type')?.includes('application/json') ? await res.json() : null;
      }

      try {
        const user = await fetchUser();
        const inviteToken = user?.user_metadata?.invite_token;
        const empresaId = user?.user_metadata?.empresa_id;

        if (inviteToken) {
          const inv = await restFetch(`/rest/v1/invitaciones?token=eq.${encodeURIComponent(inviteToken)}&estado=eq.pendiente`);
          if (inv && inv.length > 0) {
            await fetch(`${SUPABASE_URL}/rest/v1/usuario_empresas`, {
              method: 'POST',
              headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${access_token}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ usuario_id: user.id, empresa_id: inv[0].empresa_id, rol: inv[0].rol }),
            });
            await fetch(`${SUPABASE_URL}/rest/v1/invitaciones?id=eq.${inv[0].id}`, {
              method: 'PATCH',
              headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${access_token}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
              body: JSON.stringify({ estado: 'aceptada' }),
            });
            localStorage.setItem('current_empresa_id', inv[0].empresa_id);
          }
        } else if (empresaId) {
          localStorage.setItem('current_empresa_id', empresaId);
        }
      } catch (e) {
        console.error('Callback error:', e);
      }

      window.location.href = '/#dashboard';
    })();
  </script>
</body>
</html>
