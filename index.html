<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finca Manager</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/components.css">
    <link rel="stylesheet" href="/src/detalle_screens.css">
    <link rel="stylesheet" href="/src/detalle_motor.css">
    <link rel="stylesheet" href="/src/form_m3.css">
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="theme-color" content="#2e7d32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;700;800&family=Work+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#ffdf9e",
                    "surface-container-high": "#f1ede6",
                    "inverse-primary": "#c4fdb8",
                    "primary-dim": "#32632e",
                    "tertiary": "#a24b27",
                    "secondary": "#7f5f08",
                    "inverse-surface": "#0f0e0c",
                    "outline": "#828079",
                    "on-background": "#393832",
                    "on-error-container": "#671200",
                    "secondary-dim": "#715400",
                    "primary-fixed-dim": "#abe3a0",
                    "surface-container-low": "#fdf9f4",
                    "on-secondary-fixed-variant": "#755700",
                    "surface-dim": "#e6e2d8",
                    "on-tertiary-fixed-variant": "#712705",
                    "on-primary-fixed": "#184917",
                    "primary-container": "#b9f1ad",
                    "primary-fixed": "#b9f1ad",
                    "error-dim": "#821a01",
                    "tertiary-container": "#ffa17d",
                    "on-secondary-fixed": "#523c00",
                    "outline-variant": "#bcb9b1",
                    "error-container": "#fa7150",
                    "secondary-fixed-dim": "#facf72",
                    "on-surface": "#393832",
                    "primary": "#3e6f39",
                    "on-secondary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "error": "#b23d21",
                    "surface-container-highest": "#ebe8df",
                    "surface": "#fffbff",
                    "on-tertiary-fixed": "#401100",
                    "surface-tint": "#3e6f39",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed-variant": "#356631",
                    "on-error": "#ffffff",
                    "on-tertiary-container": "#651f00",
                    "on-primary": "#ffffff",
                    "surface-variant": "#ebe8df",
                    "inverse-on-surface": "#9f9c99",
                    "secondary-fixed": "#ffdf9e",
                    "tertiary-fixed": "#ffa17d",
                    "tertiary-fixed-dim": "#f98f65",
                    "surface-bright": "#fffbff",
                    "on-secondary-container": "#694d00",
                    "on-surface-variant": "#66645e",
                    "background": "#fffbff",
                    "tertiary-dim": "#923f1c",
                    "surface-container": "#f7f3ed",
                    "on-primary-container": "#2c5c28"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "display": ["Manrope"],
                    "body": ["Work Sans"],
                    "label": ["Work Sans"]
            }
          }
        }
      }
    </script>    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(12px);
        background-color: rgba(62, 111, 57, 0.08);
      }
    </style>
</head>
<body>
    <div id="app">
        <!-- Sidebar/Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="sidebar-close" class="m3-icon-btn-tonal mobile-only" aria-label="Cerrar menú">
                    <span class="m3-icon-btn-ripple"></span>
                    <span class="material-icons">menu</span>
                </button>
                <div class="header-main">
                    <h1>Finca Manager</h1>
                    <p>Gestión Agrícola</p>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="#ganado" class="nav-link" data-screen="ganado"><img src="/vaca.png" alt="Ganado" style="width: 24px; height: 24px; filter: grayscale(1) opacity(0.8);"> <span class="nav-text">Ganado</span></a></li>
                <li><a href="#motores" class="nav-link active" data-screen="motores"><span class="material-icons">settings_input_component</span> <span class="nav-text">Motores</span></a></li>
                <li><a href="#dashboard" class="nav-link" data-screen="dashboard"><img src="/planta-de-cafe.png" alt="Cafetal" style="width: 24px; height: 24px; filter: grayscale(1) opacity(0.8);"> <span class="nav-text">Cafetal</span></a></li>
                <li><a href="#herramientas" class="nav-link" data-screen="herramientas"><span class="material-icons">construction</span> <span class="nav-text">Herramientas</span></a></li>
                <li><a href="#potreros" class="nav-link" data-screen="potreros"><span class="material-icons">landscape</span> <span class="nav-text">Potreros</span></a></li>
            </ul>
            <div class="sidebar-footer">
                <button id="pwa-install" class="nav-link" style="display: none; width: 100%; cursor: pointer; border: none; background: rgba(46,125,50,0.1); color: var(--primary); margin-bottom: 12px;">
                    <span class="material-icons">install_mobile</span> <span class="nav-text">Instalar App</span>
                </button>
                <a href="#perfil" class="nav-link"><span class="material-icons">account_circle</span> <span class="nav-text">Mi Perfil</span></a>
                <button id="sidebar-collapse" class="nav-link desktop-only" style="background: transparent; border: none; cursor: pointer; width: 100%; text-align: left; padding-left: 20px;">
                    <span class="material-icons" title="Contraer menú">view_sidebar</span>
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <button id="menu-toggle" class="menu-toggle m3-icon-btn-tonal" aria-label="Abrir menú">
                    <span class="m3-icon-btn-ripple"></span>
                    <span class="material-icons">menu</span>
                </button>
                <h2 id="current-screen-title">Lista de Motores</h2>
                <div class="user-actions">
                    <span class="material-icons">notifications</span>
                </div>
            </header>

            <div id="screen-container" class="preview-container">
                <!-- Screen content will be loaded here -->
            </div>
        </main>
    </div>
    <!-- Snackbar System Container -->
    <div id="snackbar-container"></div>

    <!-- Modal System -->
    <div id="modal-container" class="modal-overlay">
        <div class="modal-content" id="modal-body">
            <!-- Form content will be injected here -->
        </div>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
