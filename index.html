<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finca Manager</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/components.css">
    <link rel="stylesheet" href="/src/detalle_screens.css">
    <link rel="stylesheet" href="/src/detalle_motor.css">
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="theme-color" content="#2e7d32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Sidebar/Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>Finca Manager</h1>
                <p>Gestión Agrícola</p>
            </div>
            <ul class="nav-links">
                <li><a href="#dashboard" class="nav-link active" data-screen="dashboard"><span class="material-icons">psychology_alt</span> Cafetal</a></li>
                <li><a href="#motores" class="nav-link" data-screen="motores"><span class="material-icons">settings_input_component</span> Motores</a></li>
                <li><a href="#herramientas" class="nav-link" data-screen="herramientas"><span class="material-icons">construction</span> Herramientas</a></li>
                <li><a href="#ganado" class="nav-link" data-screen="ganado"><span class="material-icons">pets</span> Ganado</a></li>
                <li><a href="#potreros" class="nav-link" data-screen="potreros"><span class="material-icons">landscape</span> Potreros</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="#perfil" class="nav-link"><span class="material-icons">account_circle</span> Mi Perfil</a>
                <a href="#" class="nav-link logout"><span class="material-icons">logout</span> Cerrar Sesión</a>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <button id="menu-toggle" class="menu-toggle">
                    <span class="material-icons">menu</span>
                </button>
                <h2 id="current-screen-title">Dashboard Cafetal</h2>
                <div class="user-actions">
                    <span class="material-icons">notifications</span>
                </div>
            </header>

            <div id="screen-container" class="preview-container">
                <!-- Screen content will be loaded here -->
            </div>
        </main>
    </div>
    <!-- Modal System -->
    <div id="modal-container" class="modal-overlay">
        <div class="modal-content" id="modal-body">
            <!-- Form content will be injected here -->
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
