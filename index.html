<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finca Manager</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/components.css">
    <link rel="stylesheet" href="/src/detalle_screens.css">
    <link rel="stylesheet" href="/src/detalle_motor.css">
    <link rel="stylesheet" href="/src/form_m3.css">
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="theme-color" content="#2e7d32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;700;800&family=Work+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        corePlugins: { preflight: false },
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "tertiary": "#a24b27",
              "surface-container-high": "#f1ede6",
              "primary-fixed-dim": "#abe3a0",
              "primary": "#3e6f39",
              "secondary-fixed-dim": "#facf72",
              "surface-bright": "#fffbff",
              "tertiary-container": "#ffa17d",
              "on-tertiary-fixed-variant": "#712705",
              "tertiary-fixed": "#ffa17d",
              "on-error-container": "#671200",
              "error-container": "#fa7150",
              "surface-container-lowest": "#ffffff",
              "surface-dim": "#e6e2d8",
              "surface-tint": "#3e6f39",
              "secondary-dim": "#715400",
              "error-dim": "#821a01",
              "primary-dim": "#32632e",
              "surface-variant": "#ebe8df",
              "outline-variant": "#bcb9b1",
              "on-primary-fixed-variant": "#356631",
              "on-primary-fixed": "#184917",
              "on-surface-variant": "#66645e",
              "on-tertiary": "#ffffff",
              "inverse-on-surface": "#9f9c99",
              "on-surface": "#393832",
              "surface-container-low": "#fdf9f4",
              "on-secondary-fixed": "#523c00",
              "secondary": "#7f5f08",
              "on-primary-container": "#2c5c28",
              "surface": "#fffbff",
              "error": "#b23d21",
              "on-secondary-fixed-variant": "#755700",
              "inverse-surface": "#0f0e0c",
              "tertiary-dim": "#923f1c",
              "background": "#fffbff",
              "on-tertiary-fixed": "#401100",
              "primary-container": "#b9f1ad",
              "primary-fixed": "#b9f1ad",
              "inverse-primary": "#c4fdb8",
              "on-secondary-container": "#694d00",
              "on-secondary": "#ffffff",
              "on-background": "#393832",
              "on-error": "#ffffff",
              "surface-container-highest": "#ebe8df",
              "secondary-fixed": "#ffdf9e",
              "secondary-container": "#ffdf9e",
              "on-primary": "#ffffff",
              "tertiary-fixed-dim": "#f98f65",
              "on-tertiary-container": "#651f00",
              "outline": "#828079",
              "surface-container": "#f7f3ed"
            },
            "borderRadius": {
              "DEFAULT": "1rem",
              "lg": "2rem",
              "xl": "3rem",
              "full": "9999px"
            },
            "fontFamily": {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Work Sans"],
              "label": ["Work Sans"]
            }
          }
        }
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(12px);
        background-color: rgba(62, 111, 57, 0.08);
      }
    </style>
</head>
<body>
    <div id="app">
        <!-- Sidebar/Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="header-main">
                    <h1>Finca Manager</h1>
                    <p>Gestión Agrícola</p>
                </div>
                <button id="sidebar-close" class="btn-close mobile-only">
                    <span class="material-icons">close</span>
                </button>
            </div>
            <ul class="nav-links">
                <li><a href="#motores" class="nav-link active" data-screen="motores"><span class="material-icons">settings_input_component</span> Motores</a></li>
                <li><a href="#dashboard" class="nav-link" data-screen="dashboard"><span class="material-icons">psychology_alt</span> Cafetal</a></li>
                <li><a href="#herramientas" class="nav-link" data-screen="herramientas"><span class="material-icons">construction</span> Herramientas</a></li>
                <li><a href="#ganado" class="nav-link" data-screen="ganado"><span class="material-icons">pets</span> Ganado</a></li>
                <li><a href="#potreros" class="nav-link" data-screen="potreros"><span class="material-icons">landscape</span> Potreros</a></li>
            </ul>
            <div class="sidebar-footer">
                <button id="pwa-install" class="nav-link" style="display: none; width: 100%; cursor: pointer; border: none; background: rgba(46,125,50,0.1); color: var(--primary); margin-bottom: 12px;">
                    <span class="material-icons">install_mobile</span> Instalar App
                </button>
                <a href="#perfil" class="nav-link"><span class="material-icons">account_circle</span> Mi Perfil</a>
                <a href="#" class="nav-link logout"><span class="material-icons">logout</span> Cerrar Sesión</a>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <button id="menu-toggle" class="menu-toggle">
                    <span class="material-icons">menu</span>
                </button>
                <h2 id="current-screen-title">Lista de Motores</h2>
                <div class="user-actions">
                    <span class="material-icons">notifications</span>
                </div>
            </header>

            <div id="screen-container" class="preview-container">
                <!-- Screen content will be loaded here -->
            </div>
        </main>
    </div>
    <!-- Snackbar System Container -->
    <div id="snackbar-container"></div>

    <!-- Modal System -->
    <div id="modal-container" class="modal-overlay">
        <div class="modal-content" id="modal-body">
            <!-- Form content will be injected here -->
        </div>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
