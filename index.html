<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finca Manager</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/components.css">
    <link rel="stylesheet" href="/src/detalle_screens.css">
    <link rel="stylesheet" href="/src/detalle_motor.css">
    <link rel="stylesheet" href="/src/form_m3.css">
    <link rel="icon" type="image/svg+xml" href="/pwa-512x512.svg" />
    <meta name="theme-color" content="#2d3e2c">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Work+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(12px);
        background-color: rgba(69, 87, 67, 0.08);
      }
    </style>
</head>
<body>
    <div id="app">
        <!-- Sidebar/Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="sidebar-close" class="m3-icon-btn-tonal mobile-only" aria-label="Cerrar menú">
                    <span class="m3-icon-btn-ripple"></span>
                    <span class="material-icons">menu</span>
                </button>
                <a href="#perfil" class="nav-link header-main" data-screen="perfil">
                    <img src="/pwa-512x512.svg" alt="Finca Manager" class="sidebar-logo">
                    <span class="nav-text" style="display:flex;flex-direction:column;line-height:1.2;">
                        <span id="sidebar-empresa-name" style="font-weight:700;"></span>
                        <span style="font-size:11px;opacity:.7;">Gestión Agrícola</span>
                    </span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="#dashboard" class="nav-link" data-screen="dashboard"><img src="/planta-de-cafe.png" alt="Cafetal" class="nav-icon-img"> <span class="nav-text">Cafetal</span></a></li>
                <li><a href="#ganado" class="nav-link" data-screen="ganado"><img src="/vaca.png" alt="Ganado" class="nav-icon-img"> <span class="nav-text">Ganado</span></a></li>
                <li><a href="#personal" class="nav-link" data-screen="personal"><span class="material-icons">groups</span> <span class="nav-text">Personal</span></a></li>
                <li><a href="#motores" class="nav-link" data-screen="motores"><span class="material-icons">settings_suggest</span> <span class="nav-text">Motores</span></a></li>
                <li><a href="#herramientas" class="nav-link" data-screen="herramientas"><span class="material-icons">construction</span> <span class="nav-text">Herramientas</span></a></li>
                <li><a href="#potreros" class="nav-link" data-screen="potreros"><span class="material-icons">landscape</span> <span class="nav-text">Potreros</span></a></li>
                <li><a href="#sin_conexion" class="nav-link" data-screen="sin_conexion"><span class="material-icons">wifi_off</span> <span class="nav-text">Sin Conexión</span></a></li>
                <li><a href="#equipo" class="nav-link" data-screen="equipo"><span class="material-icons">group</span> <span class="nav-text">Equipo</span></a></li>
                <li><a href="#configuracion" class="nav-link" data-screen="configuracion"><span class="material-icons">settings</span> <span class="nav-text">Configuración</span></a></li>
                <li style="margin-top:8px;border-top:1px solid var(--m3-outline-variant,#e0e0e0);padding-top:8px;"><button id="sidebar-logout" class="nav-link" style="width:100%;cursor:pointer;border:none;background:transparent;color:#ff4103;text-align:left;display:flex;align-items:center;gap:12px;padding:10px 20px;border-radius:0;font-size:14px;font-weight:500;font-family:'Work Sans',sans-serif;">
                    <span class="material-icons" style="font-size:24px;">logout</span> <span class="nav-text">Cerrar sesión</span>
                </button></li>
            </ul>
            <div class="sidebar-footer">
                <button id="pwa-install" class="nav-link" style="display: none; width: 100%; cursor: pointer; border: none; background: rgba(69,87,67,0.1); color: #2d3e2c; margin-bottom: 12px;">
                    <span class="material-icons">install_mobile</span> <span class="nav-text">Instalar App</span>
                </button>
                <button id="sidebar-collapse" class="nav-link desktop-only" style="background: transparent; border: none; cursor: pointer; width: 100%; text-align: left; padding-left: 20px;">
                    <span class="material-icons" title="Contraer menú">view_sidebar</span>
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <button id="menu-toggle" class="menu-toggle m3-icon-btn-tonal" aria-label="Abrir menú">
                    <span class="m3-icon-btn-ripple"></span>
                    <span class="material-icons">menu</span>
                </button>
                <h2 id="current-screen-title">Dashboard Cafetal</h2>
                <span id="empresa-selector" style="display:none;margin:0 12px;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,0.15);font-size:12px;font-weight:600;color:#2d3e2c;cursor:pointer;align-items:center;gap:4px;white-space:nowrap;" onclick="window.openEmpresaSwitcher()">
                  <span id="empresa-selector-name" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;"></span>
                  <span class="material-icons" style="font-size:16px;">arrow_drop_down</span>
                </span>
                <div class="user-actions" id="sync-status-area" style="position:relative;">
                    <span style="position:relative;display:inline-flex;">
                        <span id="sync-icon" class="material-icons" style="cursor:pointer;">notifications</span>
                        <span id="sync-badge" style="position:absolute;top:-6px;right:-10px;min-width:18px;height:18px;border-radius:9px;background:#ff4103;color:#fff;font-size:11px;font-weight:700;display:none;align-items:center;justify-content:center;border:2px solid var(--m3-surface,#f0ede4);transition:all .3s;padding:0 4px;line-height:1;box-shadow:0 2px 6px rgba(0,0,0,0.2);"></span>
                    </span>
                    <div id="notif-dropdown" style="display:none;position:absolute;top:100%;right:0;width:340px;max-height:400px;overflow-y:auto;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.12);z-index:1000;margin-top:8px;padding:8px 0;"></div>
                </div>
            </header>

            <div id="screen-container" class="preview-container">
                <!-- Screen content will be loaded here -->
            </div>
        </main>
    </div>
    <!-- Snackbar System Container -->
    <div id="snackbar-container"></div>

    <!-- Modal System -->
    <div id="modal-container" class="modal-overlay">
        <div class="modal-content" id="modal-body">
            <!-- Form content will be injected here -->
        </div>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
