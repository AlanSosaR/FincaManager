<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finca Manager</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/components.css">
    <link rel="stylesheet" href="/src/detalle_screens.css">
    <link rel="stylesheet" href="/src/detalle_motor.css">
    <link rel="stylesheet" href="/src/form_m3.css">
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="theme-color" content="#2e7d32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;700;800&family=Work+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(12px);
        background-color: rgba(62, 111, 57, 0.08);
      }
    </style>
</head>
<body>
    <div id="app">
        <!-- Sidebar/Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="sidebar-close" class="m3-icon-btn-tonal mobile-only" aria-label="Cerrar menú">
                    <span class="m3-icon-btn-ripple"></span>
                    <span class="material-icons">menu</span>
                </button>
                <div class="header-main">
                    <h1>Finca Manager</h1>
                    <p>Gestión Agrícola</p>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="#dashboard" class="nav-link" data-screen="dashboard"><img src="/planta-de-cafe.png" alt="Cafetal" style="width: 24px; height: 24px; filter: grayscale(1) opacity(0.8);"> <span class="nav-text">Cafetal</span></a></li>
                <li><a href="#ganado" class="nav-link" data-screen="ganado"><img src="/vaca.png" alt="Ganado" style="width: 24px; height: 24px; filter: grayscale(1) opacity(0.8);"> <span class="nav-text">Ganado</span></a></li>
                <li><a href="#personal" class="nav-link" data-screen="personal"><span class="material-icons">groups</span> <span class="nav-text">Personal</span></a></li>
                <li><a href="#motores" class="nav-link" data-screen="motores"><span class="material-icons">settings_input_component</span> <span class="nav-text">Motores</span></a></li>
                <li><a href="#herramientas" class="nav-link" data-screen="herramientas"><span class="material-icons">construction</span> <span class="nav-text">Herramientas</span></a></li>
                <li><a href="#potreros" class="nav-link" data-screen="potreros"><span class="material-icons">landscape</span> <span class="nav-text">Potreros</span></a></li>
            </ul>
            <div class="sidebar-footer">
                <button id="pwa-install" class="nav-link" style="display: none; width: 100%; cursor: pointer; border: none; background: rgba(46,125,50,0.1); color: var(--primary); margin-bottom: 12px;">
                    <span class="material-icons">install_mobile</span> <span class="nav-text">Instalar App</span>
                </button>
                <a href="#perfil" class="nav-link"><span class="material-icons">account_circle</span> <span class="nav-text">Mi Perfil</span></a>
                <button id="sidebar-collapse" class="nav-link desktop-only" style="background: transparent; border: none; cursor: pointer; width: 100%; text-align: left; padding-left: 20px;">
                    <span class="material-icons" title="Contraer menú">view_sidebar</span>
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <button id="menu-toggle" class="menu-toggle m3-icon-btn-tonal" aria-label="Abrir menú">
                    <span class="m3-icon-btn-ripple"></span>
                    <span class="material-icons">menu</span>
                </button>
                <h2 id="current-screen-title">Dashboard Cafetal</h2>
                <div class="user-actions">
                    <span class="material-icons">notifications</span>
                </div>
            </header>

            <div id="screen-container" class="preview-container">
                <!-- Screen content will be loaded here -->
            </div>
        </main>
    </div>
    <!-- Snackbar System Container -->
    <div id="snackbar-container"></div>

    <!-- Modal System -->
    <div id="modal-container" class="modal-overlay">
        <div class="modal-content" id="modal-body">
            <!-- Form content will be injected here -->
        </div>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
